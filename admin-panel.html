<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Downloads</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html {
            font-size: clamp(15px, 0.18vw + 14.4px, 16px);
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            overflow-x: hidden;
        }

        h1, h2, h3, p, label, button, input, textarea, select {
            overflow-wrap: anywhere;
        }

        h1, h2, h3 {
            text-wrap: balance;
        }

        .admin-header {
            background: #003366;
            color: white;
            padding: 1rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-content,
        .container {
            width: min(1100px, calc(100% - 2rem));
            margin: 0 auto;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: #FF8C00;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg {
            width: 24px;
            height: 24px;
            stroke: white;
            fill: none;
            stroke-width: 2;
        }

        .header-info h1 {
            font-size: 1.25rem;
            margin: 0;
        }

        .header-info p,
        .user-email {
            margin: 0;
            font-size: 0.875rem;
            color: #cbd5e1;
        }

        .btn-logout,
        .btn-primary,
        .btn-secondary,
        .btn-danger {
            border: none;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .btn-logout {
            background: transparent;
            border: 2px solid #FF8C00;
            color: #FF8C00;
        }

        .btn-logout:hover {
            background: #FF8C00;
            color: white;
        }

        .btn-primary {
            background: #FF8C00;
            color: white;
        }

        .btn-primary:hover {
            background: #e07b00;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #334155;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .container {
            padding: 2rem 0 3rem;
            display: grid;
            gap: 1.5rem;
        }

        .panel,
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            padding: 1.5rem;
        }

        .panel {
            display: grid;
            gap: 1rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box input,
        .form-grid input,
        .form-grid textarea,
        .form-grid select {
            width: 100%;
            padding: 0.8rem 0.9rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font: inherit;
        }

        .search-box {
            flex: 1;
            min-width: 240px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .form-grid .full {
            grid-column: 1 / -1;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .downloads-list {
            display: grid;
            gap: 1rem;
        }

        .download-item {
            border: 1px solid #e2e8f0;
            border-left: 4px solid #FF8C00;
            border-radius: 10px;
            padding: 1rem;
            display: grid;
            gap: 0.75rem;
        }

        .download-top {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
        }

        .download-top h3 {
            margin: 0 0 0.25rem;
            color: #003366;
            font-size: 1rem;
        }

        .download-meta {
            color: #64748b;
            font-size: 0.875rem;
        }

        .download-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 2rem 1rem;
        }

        @media (max-width: 720px) {
            html {
                font-size: 15px;
            }

            .header-content,
            .toolbar,
            .download-top {
                flex-direction: column;
                align-items: stretch;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-logout,
            .btn-primary,
            .btn-secondary,
            .btn-danger {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .admin-header {
                padding: 1rem;
            }

            .panel,
            .card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="header-content">
            <div class="header-title">
                <div class="header-icon">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </div>
                <div class="header-info">
                    <h1>Gerenciar Downloads</h1>
                    <p>Painel Administrativo</p>
                </div>
            </div>
            <div>
                <p class="user-email" id="user-email"></p>
                <button class="btn-logout" id="logout-btn" type="button">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="panel">
            <div class="toolbar">
                <div class="search-box">
                    <input type="search" id="search-input" placeholder="Buscar downloads por nome, descrição ou tipo">
                </div>
                <button class="btn-primary" id="new-download-btn" type="button">Novo download</button>
            </div>

            <form id="download-form" class="card">
                <input type="hidden" id="download-id">
                <div class="form-grid">
                    <div>
                        <label for="file-name">Nome do arquivo</label>
                        <input type="text" id="file-name" required>
                    </div>
                    <div>
                        <label for="file-type">Tipo</label>
                        <select id="file-type" required>
                            <option value="pdf">PDF</option>
                            <option value="doc">DOC</option>
                            <option value="xls">XLS</option>
                            <option value="zip">ZIP</option>
                            <option value="other">Outro</option>
                        </select>
                    </div>
                    <div class="full">
                        <label for="file-url">URL</label>
                        <input type="url" id="file-url" required>
                    </div>
                    <div class="full">
                        <label for="file-description">Descrição</label>
                        <textarea id="file-description" rows="4"></textarea>
                    </div>
                    <div>
                        <label for="file-size">Tamanho</label>
                        <input type="text" id="file-size" placeholder="Ex: 2.5 MB">
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-secondary" id="cancel-edit-btn" type="button">Cancelar edição</button>
                    <button class="btn-primary" type="submit" id="save-btn">Salvar</button>
                </div>
            </form>
        </section>

        <section class="card">
            <div class="downloads-list" id="downloads-list"></div>
        </section>
    </main>

    <script src="auth-client.js"></script>
    <script src="downloads-data.js"></script>
    <script>
        let downloads = [];

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return Number.isNaN(date.getTime()) ? '-' : date.toLocaleDateString('pt-BR');
        }

        function resetForm() {
            document.getElementById('download-id').value = '';
            document.getElementById('download-form').reset();
            document.getElementById('file-type').value = 'pdf';
        }

        function fillForm(download) {
            document.getElementById('download-id').value = download.id;
            document.getElementById('file-name').value = download.name || '';
            document.getElementById('file-type').value = download.type || 'pdf';
            document.getElementById('file-url').value = download.url || '';
            document.getElementById('file-description').value = download.description || '';
            document.getElementById('file-size').value = download.size || '';
            document.getElementById('file-name').focus();
        }

        function renderDownloads(list = downloads) {
            const container = document.getElementById('downloads-list');

            if (!Array.isArray(list) || list.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhum download cadastrado.</div>';
                return;
            }

            container.innerHTML = list.map((download) => `
                <article class="download-item">
                    <div class="download-top">
                        <div>
                            <h3>${escapeHtml(download.name)}</h3>
                            <div class="download-meta">${escapeHtml(download.description || 'Sem descrição')}</div>
                        </div>
                        <div class="download-meta">
                            <div>Tipo: ${escapeHtml(String(download.type || 'other').toUpperCase())}</div>
                            <div>Tamanho: ${escapeHtml(download.size || '-')}</div>
                            <div>Atualizado: ${escapeHtml(formatDate(download.date))}</div>
                            <div>Downloads: ${escapeHtml(String(download.downloads || 0))}</div>
                        </div>
                    </div>
                    <div class="download-buttons">
                        <button class="btn-secondary" type="button" onclick="startEditDownload(${Number(download.id) || 0})">Editar</button>
                        <button class="btn-danger" type="button" onclick="removeDownload(${Number(download.id) || 0})">Excluir</button>
                    </div>
                </article>
            `).join('');
        }

        async function refreshDownloads() {
            downloads = await window.getAllDownloads();
            renderDownloads();
        }

        async function ensureSession() {
            const session = await window.getAdminSessionStatus();
            if (!session?.authenticated) {
                window.location.href = '/admin';
                return false;
            }

            sessionStorage.setItem('adminLoggedIn', 'true');
            sessionStorage.setItem('adminEmail', session.email || '');
            document.getElementById('user-email').textContent = session.email || '';
            return true;
        }

        function filterDownloads() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = downloads.filter((download) => {
                return (
                    String(download.name || '').toLowerCase().includes(query) ||
                    String(download.description || '').toLowerCase().includes(query) ||
                    String(download.type || '').toLowerCase().includes(query)
                );
            });
            renderDownloads(filtered);
        }

        async function submitForm(event) {
            event.preventDefault();

            const id = document.getElementById('download-id').value;
            const payload = {
                name: document.getElementById('file-name').value.trim(),
                type: document.getElementById('file-type').value,
                url: document.getElementById('file-url').value.trim(),
                description: document.getElementById('file-description').value.trim(),
                size: document.getElementById('file-size').value.trim(),
            };

            try {
                if (id) {
                    await window.updateDownload(id, payload);
                } else {
                    await window.addDownload(payload);
                }

                resetForm();
                await refreshDownloads();
            } catch (error) {
                alert(error?.message || 'Nao foi possivel salvar o download.');
            }
        }

        async function logout() {
            await window.logoutAdmin();
            sessionStorage.removeItem('adminLoggedIn');
            sessionStorage.removeItem('adminEmail');
            window.location.href = '/admin';
        }

        window.startEditDownload = function(id) {
            const target = downloads.find((item) => String(item.id) === String(id));
            if (target) {
                fillForm(target);
            }
        };

        window.removeDownload = async function(id) {
            if (!confirm('Tem certeza que deseja excluir este download?')) {
                return;
            }

            try {
                await window.deleteDownload(id);
                await refreshDownloads();
            } catch (error) {
                alert(error?.message || 'Nao foi possivel remover o download.');
            }
        };

        document.getElementById('download-form').addEventListener('submit', submitForm);
        document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);
        document.getElementById('search-input').addEventListener('input', filterDownloads);
        document.getElementById('logout-btn').addEventListener('click', logout);
        document.getElementById('new-download-btn').addEventListener('click', () => {
            resetForm();
            document.getElementById('file-name').focus();
        });

        (async () => {
            try {
                const canContinue = await ensureSession();
                if (!canContinue) return;
                resetForm();
                await refreshDownloads();
            } catch (error) {
                window.location.href = '/admin';
            }
        })();
    </script>
</body>
</html>
